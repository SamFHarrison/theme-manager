name: Bug report
description: Report a reproducible problem with @bigsams/theme-manager
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the user-visible impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include a minimal reproduction or the exact steps to trigger the issue.
      placeholder: |
        1. Render ThemeProvider with...
        2. Call setTheme("dark")
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include package version, React version, browser, and runtime details.
    validations:
      required: true
